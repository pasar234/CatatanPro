<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catatan Pro SQLite</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6200ee; --danger: #b00020; --border-salin: #9c27b0; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #fff; }
        .app-bar { background: #3f51b5; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .note-card { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .toolbar { display: flex; gap: 10px; padding: 10px; background: #eee; border-bottom: 1px solid #ddd; }
        .editor-container { flex: 1; display: flex; flex-direction: column; padding: 15px; }
        .input-title { font-size: 20px; font-weight: bold; border: none; outline: none; margin-bottom: 10px; }
        .input-body { flex: 1; font-size: 18px; outline: none; min-height: 200px; }
        .footer-actions { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; border: 2px solid transparent; cursor: pointer; }
        .btn-hapus { border-color: var(--danger); color: var(--danger); background: #fff; }
        .btn-salin { border-color: var(--border-salin); color: var(--border-salin); background: #fff; }
        .btn-simpan { background: var(--primary); color: #fff; }
        .fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-icons { display: flex; gap: 15px; }
        .disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="screen-list" class="screen active">
        <div class="app-bar">
            <span>Catatan Pro SQLite</span>
            <i class="fas fa-file-import" onclick="document.getElementById('import-db').click()"></i>
            <input type="file" id="import-db" hidden accept=".db" onchange="importFromSQLite(event)">
        </div>
        <div class="content-area" id="notes-list"></div>
        <button class="fab" onclick="openEditor()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="screen-editor" class="screen">
        <div class="app-bar">
            <i class="fas fa-arrow-left" onclick="closeEditor()"></i>
            <span>EDIT CATATAN</span>
            <div class="nav-icons">
                <i class="fas fa-undo" id="btn-undo" onclick="undoAction()"></i>
                <i class="fas fa-redo" id="btn-redo" onclick="redoAction()"></i>
            </div>
        </div>
        <div class="toolbar">
            <button onclick="document.execCommand('bold')"><b>B</b></button>
            <button onclick="document.execCommand('italic')"><i>I</i></button>
            <button onclick="document.execCommand('strikeThrough')"><strike>S</strike></button>
        </div>
        <div class="editor-container">
            <input type="text" id="note-title" class="input-title" placeholder="Judul">
            <div id="note-content" class="input-body" contenteditable="true"></div>
        </div>
        <div class="footer-actions">
            <button class="btn btn-hapus" id="btn-delete" onclick="deleteNote()">HAPUS</button>
            <button class="btn btn-salin" onclick="copyNote()">SALIN</button>
            <button class="btn btn-simpan" onclick="saveNote()">SIMPAN</button>
        </div>
    </div>

    <script>
        // Inline UndoManager (Mencegah error load file eksternal)
        function UndoManager(){var e=[],t=-1;this.add=function(n){e.splice(t+1),e.push(n),t++},this.undo=function(){t>=0&&(e[t].undo(),t--)},this.redo=function(){t<e.length-1&&(t++,e[t].redo())},this.hasUndo=function(){return t>=0},this.hasRedo=function(){return t<e.length-1},this.clear=function(){e=[],t=-1}}
        
        const um = new UndoManager();
        let notes = JSON.parse(localStorage.getItem('notes_db_sqlite')) || [];
        let currentId = null;

        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = notes.map(n => `
                <div class="note-card" onclick="openEditorById(${n.id})">
                    <h3>${n.title || 'Tanpa Judul'}</h3>
                    <p>${n.content.replace(/<[^>]*>/g, '').substring(0, 50)}...</p>
                </div>
            `).join('');
        }

        function openEditor(note = null) {
            currentId = note ? note.id : null;
            document.getElementById('note-title').value = note ? note.title : '';
            document.getElementById('note-content').innerHTML = note ? note.content : '';
            document.getElementById('screen-list').classList.remove('active');
            document.getElementById('screen-editor').classList.add('active');
            um.clear();
            updateUI();
        }

        function openEditorById(id) {
            openEditor(notes.find(n => n.id === id));
        }

        function saveNote() {
            const title = document.getElementById('note-title').value;
            const content = document.getElementById('note-content').innerHTML;
            if (currentId) {
                notes = notes.map(n => n.id === currentId ? {id: n.id, title, content} : n);
            } else {
                notes.push({id: Date.now(), title, content});
            }
            localStorage.setItem('notes_db_sqlite', JSON.stringify(notes));
            closeEditor();
        }

        function closeEditor() {
            document.getElementById('screen-editor').classList.remove('active');
            document.getElementById('screen-list').classList.add('active');
            renderNotes();
        }

        function deleteNote() {
            if(confirm("Hapus?")) {
                notes = notes.filter(n => n.id !== currentId);
                localStorage.setItem('notes_db_sqlite', JSON.stringify(notes));
                closeEditor();
            }
        }

        function copyNote() {
            const text = document.getElementById('note-title').value + '\n' + document.getElementById('note-content').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Disalin!"));
        }

        // Undo Redo Basic Logic
        document.getElementById('note-content').addEventListener('input', function() {
            const html = this.innerHTML;
            um.add({
                undo: () => document.getElementById('note-content').innerHTML = html,
                redo: () => document.getElementById('note-content').innerHTML = html
            });
            updateUI();
        });

        function updateUI() {
            document.getElementById('btn-undo').classList.toggle('disabled', !um.hasUndo());
            document.getElementById('btn-redo').classList.toggle('disabled', !um.hasRedo());
        }

        function undoAction() { um.undo(); updateUI(); }
        function redoAction() { um.redo(); updateUI(); }

        renderNotes();
    </script>
</body>
</html>
