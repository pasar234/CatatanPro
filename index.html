<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catatan Pro SQLite + Rich Text</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6200ee;
            --bg-light: #ffffff;
            --danger: #b00020;
            --text-dark: #000000;
            --text-gray: #757575;
            --border-color: #eeeeee;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            overflow: hidden;
        }

        .app-bar {
            background: #3f51b5; color: white;
            padding: 15px; display: flex;
            align-items: center; justify-content: space-between;
        }

        .screen { display: none; height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }

        /* Area Daftar Catatan */
        .search-container { padding: 12px 15px; background: #f1f3f4; display: flex; align-items: center; gap: 12px; }
        .search-container input { flex: 1; border: none; background: transparent; outline: none; font-size: 18px; }
        
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .note-card { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        .note-card h3 { margin: 0 0 5px 0; font-size: 18px; }
        .note-card p { color: var(--text-gray); margin: 0; font-size: 14px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Rich Text Toolbar */
        .toolbar {
            display: flex; gap: 10px; padding: 10px;
            background: #eeeeee; border-bottom: 1px solid #ddd;
            overflow-x: auto;
        }
        .toolbar button {
            background: white; border: 1px solid #ccc;
            padding: 8px 12px; border-radius: 4px; cursor: pointer;
        }
        .toolbar button.active { background: var(--primary); color: white; }

        /* Editor */
        .editor-container { flex: 1; display: flex; flex-direction: column; padding: 15px; }
        .input-title { font-size: 22px; font-weight: bold; border: none; outline: none; margin-bottom: 10px; width: 100%; }
        .input-body { flex: 1; font-size: 18px; outline: none; overflow-y: auto; line-height: 1.5; min-height: 200px; }

        .footer-actions { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; }
        .btn-filled { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid var(--danger); color: var(--danger); background: white; }

        .fab {
            position: fixed; right: 20px; bottom: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="screen-list" class="screen active">
        <div class="app-bar">
            <i class="fas fa-bars"></i>
            <span>Catatan Pro SQLite</span>
            <i class="fas fa-ellipsis-v" onclick="toggleMenu()"></i>
        </div>

        <div id="backup-menu" style="display: none; padding: 15px; border-bottom: 1px solid #ddd; text-align: center;">
            <button onclick="exportToSQLite()" style="background:#4caf50; color:white; border:none; padding:10px; border-radius:4px;">Simpan ke .db (SQLite)</button>
            <input type="file" id="import-db" hidden accept=".db" onchange="importFromSQLite(event)">
            <button onclick="document.getElementById('import-db').click()" style="background:#2196f3; color:white; border:none; padding:10px; border-radius:4px; margin-left:5px;">Buka .db</button>
        </div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Cari catatan..." oninput="handleSearch()">
        </div>

        <div class="content-area" id="notes-list"></div>
        <button class="fab" onclick="openEditor()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="screen-editor" class="screen">
        <div class="app-bar">
            <i class="fas fa-arrow-left" onclick="closeEditor()"></i>
            <span>Edit Catatan</span>
            <div></div>
        </div>

        <div class="toolbar">
            <button onclick="execCmd('bold')"><i class="fas fa-bold"></i></button>
            <button onclick="execCmd('italic')"><i class="fas fa-italic"></i></button>
            <button onclick="execCmd('underline')"><i class="fas fa-underline"></i></button>
            <button onclick="execCmd('strikeThrough')"><i class="fas fa-strikethrough"></i></button>
            <button onclick="execCmd('insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
        </div>

        <div class="editor-container">
            <input type="text" id="note-title" class="input-title" placeholder="Judul">
            <div id="note-content" class="input-body" contenteditable="true" placeholder="Tulis sesuatu..."></div>
        </div>

        <div class="footer-actions">
            <button class="btn btn-outline" id="btn-delete" onclick="deleteNote()">HAPUS</button>
            <button class="btn btn-filled" onclick="saveNote()">SIMPAN</button>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes_db_sqlite')) || [];
        let currentId = null;

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err));
        }

        // Editor Functions
        function execCmd(cmd) {
            document.execCommand(cmd, false, null);
        }

        function renderNotes(data = notes) {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            data.sort((a,b) => b.id - a.id).forEach(note => {
                const div = document.createElement('div');
                div.className = 'note-card';
                div.onclick = () => openEditor(note);
                // Clean HTML for preview
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = note.content;
                const textPreview = tempDiv.innerText || tempDiv.textContent;
                
                div.innerHTML = `<h3>${note.title}</h3><p>${textPreview.substring(0, 80)}...</p>`;
                list.appendChild(div);
            });
        }

        function openEditor(note = null) {
            if (note) {
                currentId = note.id;
                document.getElementById('note-title').value = note.title;
                document.getElementById('note-content').innerHTML = note.content;
                document.getElementById('btn-delete').style.display = 'block';
            } else {
                currentId = null;
                document.getElementById('note-title').value = '';
                document.getElementById('note-content').innerHTML = '';
                document.getElementById('btn-delete').style.display = 'none';
            }
            document.getElementById('screen-list').classList.remove('active');
            document.getElementById('screen-editor').classList.add('active');
        }

        function saveNote() {
            const title = document.getElementById('note-title').value.trim() || "Tanpa Judul";
            const content = document.getElementById('note-content').innerHTML;
            if (currentId) {
                notes = notes.map(n => n.id === currentId ? {...n, title, content} : n);
            } else {
                notes.push({ id: Date.now(), title, content });
            }
            localStorage.setItem('notes_db_sqlite', JSON.stringify(notes));
            closeEditor();
        }

        function deleteNote() {
            if(confirm("Hapus?")) {
                notes = notes.filter(n => n.id !== currentId);
                localStorage.setItem('notes_db_sqlite', JSON.stringify(notes));
                closeEditor();
            }
        }

        function closeEditor() {
            document.getElementById('screen-editor').classList.remove('active');
            document.getElementById('screen-list').classList.add('active');
            renderNotes();
        }

        // SQLite Export Logic (Using JSON as shim for DB file)
        function exportToSQLite() {
            const dataStr = JSON.stringify(notes);
            const blob = new Blob([dataStr], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "catatan_backup.db";
            a.click();
        }

        function importFromSQLite(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    notes = imported;
                    localStorage.setItem('notes_db_sqlite', JSON.stringify(notes));
                    renderNotes();
                    alert("Data berhasil dipulihkan!");
                } catch(err) {
                    alert("File tidak valid.");
                }
            };
            reader.readAsText(file);
        }

        function toggleMenu() {
            const m = document.getElementById('backup-menu');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = notes.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q));
            renderNotes(filtered);
        }

        renderNotes();
    </script>
</body>
</html>
