<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catatan Pro SQLite</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6200ee;
            --bg-light: #ffffff;
            --danger: #b00020;
            --border-salin: #9c27b0;
            --text-gray: #757575;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-light); overflow: hidden; }

        .app-bar { background: #3f51b5; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .nav-icons { display: flex; gap: 20px; }
        .nav-icons i { cursor: pointer; font-size: 20px; }
        .nav-icons i.disabled { opacity: 0.3; pointer-events: none; }

        .screen { display: none; height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }

        /* Daftar Catatan */
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .note-card { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .note-card h3 { margin: 0 0 5px 0; font-size: 18px; }
        .note-card p { color: var(--text-gray); margin: 0; font-size: 14px; }

        /* Editor & Toolbar */
        .toolbar { display: flex; gap: 10px; padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ddd; overflow-x: auto; }
        .toolbar button { background: white; border: 1px solid #ccc; padding: 8px 12px; border-radius: 4px; font-weight: bold; }

        .editor-container { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .input-title { font-size: 24px; font-weight: bold; border: none; outline: none; margin-bottom: 15px; width: 100%; }
        .input-body { flex: 1; font-size: 18px; outline: none; overflow-y: auto; line-height: 1.6; min-height: 200px; }
        [contenteditable]:empty:before { content: attr(placeholder); color: #aaa; }

        /* Footer Tombol Sesuai Gambar */
        .footer-actions { display: flex; gap: 15px; padding: 15px 20px; border-top: 1px solid #eee; background: white; }
        .btn { flex: 1; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; text-transform: uppercase; cursor: pointer; border: 2px solid transparent; text-align: center; }
        .btn-hapus { border-color: var(--danger); color: var(--danger); background: white; }
        .btn-salin { border-color: var(--border-salin); color: var(--border-salin); background: white; }
        .btn-simpan { background: var(--primary); color: white; }

        .fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="screen-list" class="screen active">
        <div class="app-bar">
            <i class="fas fa-bars"></i>
            <span>Catatan Pro SQLite</span>
            <i class="fas fa-file-download" onclick="exportToSQLite()"></i>
        </div>
        <div class="content-area" id="notes-list"></div>
        <button class="fab" onclick="openEditor()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="screen-editor" class="screen">
        <div class="app-bar">
            <i class="fas fa-arrow-left" onclick="closeEditor()"></i>
            <span style="font-weight: bold;">EDIT CATATAN</span>
            <div class="nav-icons">
                <i class="fas fa-undo" id="btn-undo" onclick="undoAction()"></i>
                <i class="fas fa-redo" id="btn-redo" onclick="redoAction()"></i>
            </div>
        </div>

        <div class="toolbar">
            <button onclick="document.execCommand('bold')">B</button>
            <button onclick="document.execCommand('italic')">I</button>
            <button onclick="document.execCommand('strikeThrough')">S</button>
        </div>

        <div class="editor-container">
            <input type="text" id="note-title" class="input-title" placeholder="Judul">
            <div id="note-content" class="input-body" contenteditable="true" placeholder="Tulis catatan..."></div>
        </div>

        <div class="footer-actions">
            <button class="btn btn-hapus" id="btn-delete" onclick="deleteNote()">HAPUS</button>
            <button class="btn btn-salin" onclick="copyNote()">SALIN</button>
            <button class="btn btn-simpan" onclick="saveNote()">SIMPAN</button>
        </div>
    </div>

    <script>
        // Sederhana UndoManager Inline
        function SimpleUndo() {
            this.history = [];
            this.index = -1;
            this.add = (data) => {
                this.history.splice(this.index + 1);
                this.history.push(data);
                if(this.history.length > 20) this.history.shift();
                else this.index++;
                updateUndoUI();
            };
            this.undo = () => { if(this.index > 0) return this.history[--this.index]; };
            this.redo = () => { if(this.index < this.history.length - 1) return this.history[++this.index]; };
        }

        const tracker = new SimpleUndo();
        let notes = JSON.parse(localStorage.getItem('notes_db_sqlite')) || [];
        let currentId = null;

        // Pendaftaran Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = notes.map(n => `
                <div class="note-card" onclick="openEditorById(${n.id})">
                    <h3>${n.title || 'Tanpa Judul'}</h3>
                    <p>${n.content.replace(/<[^>]*>/g, '').substring(0, 50)}...</p>
                </div>
            `).join('') || '<p style="text-align:center; padding:50px; color:#aaa;">Belum ada catatan.</p>';
        }

        function openEditor(note = null) {
            currentId = note ? note.id : null;
            document.getElementById('note-title').value = note ? note.title : '';
            document.getElementById('note-content').innerHTML = note ? note.content : '';
            document.getElementById('screen-list').classList.remove('active');
            document.getElementById('screen-editor').classList.add('active');
            document.getElementById('btn-delete').style.visibility = note ? 'visible' : 'hidden';
            tracker.history = []; tracker.index = -1;
            tracker.add(document.getElementById('note-content').innerHTML);
        }

        function openEditorById(id) { openEditor(notes.find(n => n.id === id)); }

        function saveNote() {
            const title = document.getElementById('note-title').value;
            const content = document.getElementById('note-content').innerHTML;
            if (currentId) notes = notes.map(n => n.id === currentId ? {id: n.id, title, content} : n);
            else notes.push({id: Date.now(), title, content});
            localStorage.setItem('notes_db_sqlite', JSON.stringify(notes));
            closeEditor();
        }

        function closeEditor() {
            document.getElementById('screen-editor').classList.remove('active');
            document.getElementById('screen-list').classList.add('active');
            renderNotes();
        }

        function deleteNote() {
            if(confirm("Hapus catatan?")) {
                notes = notes.filter(n => n.id !== currentId);
                localStorage.setItem('notes_db_sqlite', JSON.stringify(notes));
                closeEditor();
            }
        }

        function copyNote() {
            const text = document.getElementById('note-title').value + "\n\n" + document.getElementById('note-content').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Teks disalin!"));
        }

        // Undo Redo Action
        document.getElementById('note-content').addEventListener('input', () => {
            tracker.add(document.getElementById('note-content').innerHTML);
        });

        function undoAction() {
            const val = tracker.undo();
            if(val !== undefined) document.getElementById('note-content').innerHTML = val;
            updateUndoUI();
        }

        function redoAction() {
            const val = tracker.redo();
            if(val !== undefined) document.getElementById('note-content').innerHTML = val;
            updateUndoUI();
        }

        function updateUndoUI() {
            document.getElementById('btn-undo').classList.toggle('disabled', tracker.index <= 0);
            document.getElementById('btn-redo').classList.toggle('disabled', tracker.index >= tracker.history.length - 1);
        }

        function exportToSQLite() {
            const blob = new Blob([JSON.stringify(notes)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "backup_catatan.db";
            a.click();
        }

        renderNotes();
    </script>
</body>
</html>
