<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catatan Pro SQLite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6200ee;
            --danger: #b00020;
            --border-salin: #9c27b0;
            --bg-light: #ffffff;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--bg-light); }

        /* AppBar & Menu */
        .app-bar { background: #3f51b5; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .backup-panel { display: none; background: #f9f9f9; padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
        .backup-panel button { padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin: 0 5px; }

        /* Screen Management */
        .screen { display: none; height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }

        /* List Screen */
        .search-box { padding: 10px 15px; background: #f1f3f4; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; margin-left: 10px; }
        .content-list { flex: 1; overflow-y: auto; }
        .note-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .note-item h3 { margin: 0 0 5px 0; font-size: 18px; }
        .note-item p { margin: 0; color: #757575; font-size: 14px; }

        /* Editor Screen */
        .nav-icons { display: flex; gap: 20px; }
        .nav-icons i { cursor: pointer; font-size: 18px; }
        .nav-icons i.disabled { opacity: 0.3; pointer-events: none; }
        
        .toolbar { display: flex; gap: 8px; padding: 10px; background: #eee; border-bottom: 1px solid #ddd; }
        .toolbar button { background: white; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; }

        .editor-box { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .input-title { font-size: 24px; font-weight: bold; border: none; outline: none; width: 100%; margin-bottom: 15px; }
        .input-body { flex: 1; font-size: 18px; outline: none; line-height: 1.6; min-height: 300px; }

        /* Tombol Bawah Sesuai Gambar */
        .footer-actions { display: flex; gap: 10px; padding: 15px; background: white; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; border: 2px solid transparent; text-transform: uppercase; }
        .btn-hapus { border-color: var(--danger); color: var(--danger); background: white; }
        .btn-salin { border-color: var(--border-salin); color: var(--border-salin); background: white; }
        .btn-simpan { background: var(--primary); color: white; }

        .fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="screen-list" class="screen active">
        <div class="app-bar">
            <i class="fas fa-bars"></i>
            <span>Catatan Pro SQLite</span>
            <i class="fas fa-ellipsis-v" onclick="toggleBackup()"></i>
        </div>

        <div id="backup-panel" class="backup-panel">
            <button onclick="exportDB()" style="background:#4caf50; color:white;">Backup (.db)</button>
            <button onclick="document.getElementById('file-input').click()" style="background:#2196f3; color:white;">Restore (.db)</button>
            <input type="file" id="file-input" hidden accept=".db" onchange="importDB(event)">
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Cari catatan..." oninput="searchNotes(this.value)">
        </div>

        <div id="notes-list" class="content-list"></div>
        <button class="fab" onclick="openEditor()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="screen-editor" class="screen">
        <div class="app-bar">
            <i class="fas fa-arrow-left" onclick="closeEditor()"></i>
            <span style="font-weight: bold;">EDIT CATATAN</span>
            <div class="nav-icons">
                <i class="fas fa-undo" id="undo-btn" onclick="document.execCommand('undo')"></i>
                <i class="fas fa-redo" id="redo-btn" onclick="document.execCommand('redo')"></i>
            </div>
        </div>

        <div class="toolbar">
            <button onclick="document.execCommand('bold')"><b>B</b></button>
            <button onclick="document.execCommand('italic')"><i>I</i></button>
            <button onclick="document.execCommand('strikeThrough')"><strike>S</strike></button>
        </div>

        <div class="editor-box">
            <input type="text" id="note-title" class="input-title" placeholder="Judul">
            <div id="note-body" class="input-body" contenteditable="true" placeholder="Tulis catatan..."></div>
        </div>

        <div class="footer-actions">
            <button class="btn btn-hapus" id="del-btn" onclick="deleteNote()">Hapus</button>
            <button class="btn btn-salin" onclick="copyNote()">Salin</button>
            <button class="btn btn-simpan" onclick="saveNote()">Simpan</button>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes_db')) || [];
        let currentId = null;

        function renderNotes(data = notes) {
            const list = document.getElementById('notes-list');
            list.innerHTML = data.map(n => `
                <div class="note-item" onclick="openEditor(${n.id})">
                    <h3>${n.title || 'Tanpa Judul'}</h3>
                    <p>${n.body.replace(/<[^>]*>/g, '').substring(0, 60)}...</p>
                </div>
            `).join('');
        }

        function openEditor(id = null) {
            currentId = id;
            if (id) {
                const note = notes.find(n => n.id === id);
                document.getElementById('note-title').value = note.title;
                document.getElementById('note-body').innerHTML = note.body;
                document.getElementById('del-btn').style.display = 'block';
            } else {
                document.getElementById('note-title').value = '';
                document.getElementById('note-body').innerHTML = '';
                document.getElementById('del-btn').style.display = 'none';
            }
            document.getElementById('screen-list').classList.remove('active');
            document.getElementById('screen-editor').classList.add('active');
        }

        function closeEditor() {
            document.getElementById('screen-editor').classList.remove('active');
            document.getElementById('screen-list').classList.add('active');
            renderNotes();
        }

        function saveNote() {
            const title = document.getElementById('note-title').value;
            const body = document.getElementById('note-body').innerHTML;
            if (currentId) {
                notes = notes.map(n => n.id === currentId ? { ...n, title, body } : n);
            } else {
                notes.push({ id: Date.now(), title, body });
            }
            localStorage.setItem('notes_db', JSON.stringify(notes));
            closeEditor();
        }

        function deleteNote() {
            if (confirm("Hapus catatan ini?")) {
                notes = notes.filter(n => n.id !== currentId);
                localStorage.setItem('notes_db', JSON.stringify(notes));
                closeEditor();
            }
        }

        function copyNote() {
            const text = document.getElementById('note-title').value + "\n\n" + document.getElementById('note-body').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Catatan disalin!"));
        }

        function toggleBackup() {
            const panel = document.getElementById('backup-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function exportDB() {
            const blob = new Blob([JSON.stringify(notes)], { type: 'application/octet-stream' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'backup_catatan.db';
            a.click();
        }

        function importDB(e) {
            const reader = new FileReader();
            reader.onload = function() {
                notes = JSON.parse(reader.result);
                localStorage.setItem('notes_db', JSON.stringify(notes));
                renderNotes();
                alert("Berhasil restore data!");
            };
            reader.readAsText(e.target.files[0]);
        }

        function searchNotes(query) {
            const filtered = notes.filter(n => n.title.toLowerCase().includes(query.toLowerCase()));
            renderNotes(filtered);
        }

        renderNotes();
    </script>
</body>
</html>
